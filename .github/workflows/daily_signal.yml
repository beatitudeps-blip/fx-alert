name: Daily Signal - D1/W1 EMA20 Pullback Strategy

# 日足確定後に日次1回実行
# Forex daily bar closes at 17:00 ET = 22:00 UTC (standard) / 21:00 UTC (DST)
# UTC 23:00 に実行し、bar_checker で最新日足更新を確認する
on:
  schedule:
    - cron: '0 23 * * 0-4'  # UTC Sun-Thu = JST Mon-Fri morning

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (no LINE notification)'
        required: false
        default: 'false'
      equity:
        description: 'Account equity (JPY)'
        required: false
        default: '500000'

concurrency:
  group: daily-signal
  cancel-in-progress: false

env:
  TZ: Asia/Tokyo
  PYTHON_VERSION: '3.11'

jobs:
  daily-signal:
    name: Daily Signal Check & Notify
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Daily Signal
        env:
          TWELVEDATA_API_KEY: ${{ secrets.TWELVEDATA_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          EQUITY: ${{ github.event.inputs.equity || '500000' }}
        run: |
          echo "=========================================="
          echo "Daily Signal - D1_W1_EMA20_PULLBACK_V1"
          echo "=========================================="
          echo "UTC: $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "JST: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S')"
          echo "Equity: ${EQUITY}"
          echo "Dry Run: ${DRY_RUN}"
          echo "=========================================="

          python scripts/run_daily_signal.py \
            --equity "${EQUITY}" \
            --risk-pct 0.005 \
            --config config/minnafx.yaml \
            $(if [ "${DRY_RUN}" = "true" ]; then echo "--dry-run"; fi)

      - name: Build daily summary
        if: success()
        run: python scripts/build_daily_summary.py

      - name: Build GAS payload
        if: success()
        env:
          GAS_SECRET: ${{ secrets.GAS_SECRET }}
        run: python scripts/build_gas_payload.py

      - name: Send to GAS Webhook
        if: success()
        continue-on-error: true
        env:
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
        run: |
          if [ -z "${GAS_WEBHOOK_URL}" ]; then
            echo "WARN: GAS_WEBHOOK_URL not set, skipping"
          elif [ ! -f data/gas_payload.json ]; then
            echo "WARN: gas_payload.json not found, skipping"
          else
            HTTP_STATUS=$(curl -s -o /tmp/gas_response.txt -w "%{http_code}" \
              -X POST "${GAS_WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d @data/gas_payload.json \
              --max-time 30 \
              --retry 2 \
              --retry-delay 5)
            echo "GAS response: HTTP ${HTTP_STATUS}"
            cat /tmp/gas_response.txt || true
            if [ "${HTTP_STATUS}" -ge 200 ] && [ "${HTTP_STATUS}" -lt 300 ]; then
              echo "GAS送信成功"
            else
              echo "WARN: GAS returned HTTP ${HTTP_STATUS} (fail-soft)"
            fi
          fi

      - name: Commit output files
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # signals.csv, error_log.csv, daily_state.json, forward_test_log.csv, daily_signal_log.csv, reports
          git add -f data/signals.csv data/error_log.csv data/daily_state.json data/forward_test_log.csv data/daily_signal_log.csv data/reports/ 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily signal update [skip ci]" \
              -m "Run at: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')" \
              -m "Strategy: D1_W1_EMA20_PULLBACK_V1"
            git push
            echo "Output files committed"
          fi

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: daily-signal-logs-${{ github.run_id }}
          path: |
            data/signals.csv
            data/error_log.csv
            data/daily_state.json
            data/forward_test_log.csv
            data/daily_signal_log.csv
            data/gas_payload.json
            data/reports/
          retention-days: 14

      - name: Job Summary
        if: always()
        run: |
          echo "## Daily Signal Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **UTC**: $(date -u '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- **JST**: $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "- **Strategy**: D1_W1_EMA20_PULLBACK_V1" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dry Run**: ${{ github.event.inputs.dry_run || 'false' }}" >> $GITHUB_STEP_SUMMARY
